<!DOCTYPE html>
<html>
<head>
<title>Premium Menu</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;

  /* BACKGROUND IMAGE */
  background: linear-gradient(rgba(15,44,51,0.9), rgba(15,44,51,0.9)),
              url("https://images.unsplash.com/photo-1555396273-367ea4eb4db5");
  background-size: cover;
  background-attachment: fixed;
  padding: 20px;
}

/* TITLE */
h1 {
  text-align: center;
  font-size: 36px;
  color: gold;
  margin-bottom: 30px;
}

/* CATEGORY TITLE */
h2 {
  border-left: 5px solid orange;
  padding-left: 10px;
  margin-top: 40px;
  color: #ffb347;
}

/* GRID */
.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 20px;
  margin-top: 20px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  padding: 15px;
  border-radius: 15px;
  text-align: center;
  transition: 0.3s;
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

/* HOVER EFFECT */
.card:hover {
  transform: translateY(-5px) scale(1.03);
  box-shadow: 0 0 25px rgba(255,165,0,0.4);
}

/* IMAGE */
.card img {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  object-fit: cover;
  box-shadow: 0 0 10px rgba(0,0,0,0.6);
}

/* TEXT */
.card h3 {
  margin: 10px 0 5px;
}

.card p {
  margin: 5px 0;
}

/* BUTTON */
button {
  margin-top: 10px;
  padding: 8px 15px;
  background: linear-gradient(45deg, orange, #ff5e00);
  border: none;
  color: white;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}
</style>
</head>

<body>

<h1>🍽️ Premium Menu</h1>

<!-- PIZZA -->
<h2 id="pizza">🍕 Pizza</h2>
<div class="menu">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1601924638867-3ec2f4f5d2b4">
    <h3>Margherita</h3>
    <p>₹199 | 10 min</p>
    <button>Order</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65">
    <h3>Farmhouse</h3>
    <p>₹249 | 12 min</p>
    <button>Order</button>
  </div>
</div>

<!-- BURGER -->
<h2 id="burger">🍔 Burger</h2>
<div class="menu">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
    <h3>Veg Burger</h3>
    <p>₹99 | 5 min</p>
    <button>Order</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
    <h3>Cheese Burger</h3>
    <p>₹129 | 6 min</p>
    <button>Order</button>
  </div>
</div>

<!-- DOSA -->
<h2 id="dosa">🥞 Dosa</h2>
<div class="menu">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1631515243349-e0cb75fb8d3a">
    <h3>Masala Dosa</h3>
    <p>₹120 | 8 min</p>
    <button>Order</button>
  </div>
</div>

<!-- DRINKS -->
<h2 id="drinks">🥤 Cold Drinks</h2>
<div class="menu">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
    <h3>Cold Coffee</h3>
    <p>₹80 | 2 min</p>
    <button>Order</button>
  </div>
</div>

<script>
const cat = new URLSearchParams(window.location.search).get("category");

if(cat){
  document.getElementById(cat).scrollIntoView({
    behavior: "smooth"
  });
}
</script>

</body>
</html>
